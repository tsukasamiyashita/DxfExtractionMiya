name: Build EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Python環境のセットアップ
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 必要なライブラリのインストール
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    # PyInstallerでexe化の実行 (ファイルの存在を自動チェックしてエラーを回避)
    - name: Build with PyInstaller
      shell: pwsh
      run: |
        $cmd = "pyinstaller --onefile --noconsole --clean --name `"DxfExtractionMiya-v1.3.0`""
        
        # READMEの存在確認 (大文字・小文字両対応)
        if (Test-Path "README.md") { $cmd += " --add-data `"README.md;.`"" }
        elseif (Test-Path "readme.md") { $cmd += " --add-data `"readme.md;.`"" }
        
        # アイコンの存在確認
        if (Test-Path "icon.ico") { $cmd += " --add-data `"icon.ico;.`" --icon `"icon.ico`"" }
        
        $cmd += " app.py"
        Write-Host "実行するコマンド: $cmd"
        Invoke-Expression $cmd

    # 完成したexeファイルをアップロード
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DxfExtractionMiya-v1.3.0
        path: dist/DxfExtractionMiya-v1.3.0.exe